<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kiddie Log - Evangel ICGC</title>
  <meta name="theme-color" content="#170604">
  <meta name="description" content="Kiddie Log Children Service Attendance Launcher">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark:#170604;
      --brand:#8b1416;
      --gold:#c99732;
      --gold2:#f3d37a;
      --cream:#fff4c9;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html, body { width:100%; min-height:100%; min-height:100svh; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--dark);
      color: var(--cream);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .splash {
      min-height:100svh;
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:calc(26px + var(--safe-top)) 20px calc(26px + var(--safe-bottom));
      background:
        radial-gradient(circle at 50% 24%, rgba(243,211,122,.22), transparent 20rem),
        radial-gradient(circle at 50% 62%, rgba(139,20,22,.45), transparent 28rem),
        linear-gradient(180deg,#140403 0%,#240806 46%,#130403 100%);
      position:relative;
      isolation:isolate;
    }
    .splash::before {
      content:"";
      position:absolute;
      inset:0;
      z-index:-1;
      background-image:
        linear-gradient(rgba(243,211,122,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(243,211,122,.035) 1px, transparent 1px);
      background-size:24px 24px;
      mask-image:radial-gradient(circle at center, rgba(0,0,0,.75), transparent 72%);
    }
    .panel {
      width:min(100%,430px);
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:clamp(16px,4vh,26px);
    }
    .icon-wrap {
      width:clamp(132px,38vw,190px);
      height:clamp(132px,38vw,190px);
      border-radius:clamp(34px,9vw,46px);
      display:grid;
      place-items:center;
      background:linear-gradient(145deg,rgba(255,244,201,.08),rgba(255,244,201,.01)),#160504;
      box-shadow:
        0 0 0 2px rgba(201,151,50,.9),
        0 0 0 10px rgba(201,151,50,.08),
        0 28px 90px rgba(201,151,50,.22),
        0 12px 34px rgba(0,0,0,.38);
      overflow:hidden;
    }
    .icon-wrap svg { width:100%; height:100%; display:block; }
    .app-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size:clamp(42px,14vw,68px);
      line-height:.94;
      font-weight:800;
      letter-spacing:-.045em;
      color:#ffe49b;
      text-shadow:0 0 24px rgba(243,211,122,.28);
    }
    .app-sub {
      margin-top:-6px;
      font-size:clamp(13px,4vw,18px);
      color:rgba(255,228,155,.68);
      letter-spacing:.3em;
      text-transform:uppercase;
      font-weight:800;
    }
    .open-btn {
      width:min(100%,360px);
      min-height:64px;
      border:1px solid rgba(255,244,201,.25);
      border-radius:999px;
      background:linear-gradient(135deg,#a51b21 0%,#c99732 64%,#f3d37a 100%);
      color:#fff5d0;
      font-size:clamp(18px,5vw,24px);
      font-weight:900;
      cursor:pointer;
      box-shadow:0 20px 42px rgba(139,20,22,.35),0 0 36px rgba(201,151,50,.18);
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    .open-btn:active { transform:scale(.97); filter:brightness(1.08); }
    .microcopy {
      max-width:34ch;
      font-size:13px;
      line-height:1.45;
      color:rgba(255,244,201,.58);
    }
    .production {
      position:fixed;
      left:16px;
      right:16px;
      bottom:calc(14px + var(--safe-bottom));
      text-align:center;
      font-size:10px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,244,201,.45);
      font-weight:800;
    }
    .production strong { color:rgba(243,211,122,.82); }
    .fallback {
      margin-top:4px;
      font-size:12px;
      color:rgba(255,244,201,.5);
    }
    .fallback a { color:#f3d37a; }
    @media (max-height:700px) {
      .panel { gap:14px; }
      .icon-wrap { width:126px; height:126px; border-radius:32px; }
      .app-name { font-size:42px; }
      .open-btn { min-height:56px; }
      .microcopy { display:none; }
    }
  </style>
</head>
<body>
  <main class="splash">
    <section class="panel" aria-label="Kiddie Log Launcher">
      <div class="icon-wrap" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140">
          <rect width="140" height="140" fill="#170604"/>
          <rect x="8" y="8" width="124" height="124" rx="22" fill="none" stroke="#c99732" stroke-width="2.5" opacity=".95"/>
          <rect x="16" y="16" width="108" height="108" rx="10" fill="none" stroke="#8b1416" stroke-width="1.5" opacity=".95"/>
          <ellipse cx="70" cy="64" rx="38" ry="42" fill="#8b1416" opacity=".30"/>
          <path d="M38 96 Q38 52 70 44 Q102 52 102 96" fill="none" stroke="#c99732" stroke-width="4"/>
          <polygon points="70,24 62,36 56,31 60,42 70,39 80,42 84,31 78,36" fill="#f3d37a"/>
          <circle cx="70" cy="58" r="8" fill="#f3d37a"/>
          <path d="M60 88 Q66 69 70 66 Q74 69 80 88" fill="#f3d37a" opacity=".9"/>
          <circle cx="44" cy="94" r="5" fill="#c99732"/><path d="M38 110 Q41 99 44 96 Q47 99 50 110" fill="#c99732"/>
          <circle cx="56" cy="93" r="5" fill="#c99732"/><path d="M50 110 Q53 98 56 95 Q59 98 62 110" fill="#c99732"/>
          <circle cx="84" cy="93" r="5" fill="#c99732"/><path d="M78 110 Q81 98 84 95 Q87 98 90 110" fill="#c99732"/>
          <circle cx="96" cy="94" r="5" fill="#c99732"/><path d="M90 110 Q93 99 96 96 Q99 99 102 110" fill="#c99732"/>
          <text x="70" y="124" font-family="Georgia,serif" font-size="9" fill="#f3d37a" text-anchor="middle" font-weight="bold" letter-spacing="1.4">KIDDIE LOG</text>
        </svg>
      </div>
      <div>
        <div class="app-name">Kiddie Log</div>
        <div class="app-sub">Evangel ICGC</div>
      </div>
      <button class="open-btn" type="button" onclick="openApp()">Open App</button>
      <p class="microcopy">Secure children service check-in, pickup verification, delegate control, and attendance logging.</p>
      <p class="fallback">If it does not open, <a href="https://script.google.com/macros/s/AKfycbyi6GvFZh14Sc5KowiASruLRxdDmaeNbPvKmgYzJgqU/exec">tap here</a>.</p>
    </section>
    <div class="production"><strong>Dataformatic Production</strong> &copy; 2026</div>
  </main>
  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyi6GvFZh14Sc5KowiASruLRxdDmaeNbPvKmgYzJgqU/exec";
    function openApp() {
      window.location.assign(APP_URL);
    }
  </script>
</body>
</html>
