<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>Kiddie Log - Evangel ICGC</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            min-height: 100svh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 50% 24%, rgba(243, 211, 122, .22), transparent 20rem), linear-gradient(180deg, #140403, #240806 46%, #130403);
            font-family: system-ui;
            color: #fff4c9;
            padding: 22px
        }

        .panel {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center
        }

        .icon {
            width: 150px;
            height: 150px;
            border-radius: 38px;
            border: 2px solid #c99732;
            display: grid;
            place-items: center;
            background: #160504;
            box-shadow: 0 0 0 10px rgba(201, 151, 50, .08)
        }

        .icon span {
            font-size: 54px;
            font-weight: 900;
            color: #f3d37a;
            font-family: Georgia, serif
        }

        .name {
            font: 800 clamp(42px, 14vw, 68px)/.94 Georgia, serif;
            color: #ffe49b
        }

        .sub {
            font-weight: 800;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: rgba(255, 228, 155, .68)
        }

        button {
            width: min(100%, 360px);
            min-height: 64px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(135deg, #a51b21, #c99732 64%, #f3d37a);
            color: #fff5d0;
            font-size: 22px;
            font-weight: 900
        }

        .foot {
            position: fixed;
            bottom: 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .14em;
            color: rgba(255, 244, 201, .45)
        }
    </style>
</head>

<body>
    <main class="panel">
        <div class="icon"><span>KL</span></div>
        <div>
            <div class="name">Kiddie Log</div>
            <div class="sub">Evangel ICGC</div>
        </div><button onclick="openApp()">Open App</button>
        <p>Tap Open App to launch the Kiddie Log interface.</p>
    </main>
    <div class="foot">Dataformatic Production © 2026</div>
    <script>const APP_URL = 'https://script.google.com/macros/sAKfycbwU-El8JX71LLoC1iHvWC0mp_kY3Wca2_trd6hQaGM2jv33TGb9DaQ2I906pLpbiE5M4A/exec'; function openApp() { location.assign(APP_URL) }</script>
</body>

</html>
